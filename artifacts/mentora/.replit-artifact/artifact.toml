kind = "web"
previewPath = "/"
title = "Mentora AI"
version = "1.0.0"
id = "artifacts/mentora"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19768

[services.development]
run = "pnpm --filter @workspace/mentora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mentora", "run", "build" ]
publicDir = "artifacts/mentora/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19768"
BASE_PATH = "/"
